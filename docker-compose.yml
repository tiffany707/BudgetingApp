
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"          # Express API runs on port 5000
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"          # React app runs on port 5173
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env

  # 1. DATABASE SERVICE
  db:
    image: postgres:16-alpine
    container_name: budgeting_postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234  # Change this to whatever password you want
      - POSTGRES_DB=BudgetingApp
    ports:
      - "5432:5432"                           # Exposes port 5432 so pgAdmin can connect to it
    volumes:
      - postgres_data:/var/lib/postgresql/data # Saves your data so it isn't deleted when Docker stops\
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:

